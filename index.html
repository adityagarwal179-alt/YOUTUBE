<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Academic Vault 2026</title>
    <style>
        :root { --pharma: #ff4d6d; --bca: #00f2ff; --bg: #050505; --card: #121212; --accent: #00ff00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 35px; border: 1px solid #333; }
        .subject-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .url-updater { display: flex; gap: 10px; margin-bottom: 15px; }
        input, textarea { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; }
        textarea { width: 100%; height: 80px; box-sizing: border-box; margin-top: 10px; }
        button { cursor: pointer; padding: 5px 15px; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; }
        button:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 MASTER STUDY VAULT 2026</h1>

    <div class="card">
        <div class="subject-title">CHEMISTRY</div>
        <div class="url-updater">
            <input type="text" placeholder="Paste YouTube Link..." id="in-chem">
            <button onclick="saveVideo('vid-chem', 'in-chem')">UPDATE VIDEO</button>
        </div>
        <div class="video-box" id="vid-chem">NO VIDEO</div>
        <textarea id="text-chem" oninput="saveText('text-chem')" placeholder="Write important questions here..."></textarea>
    </div>

    <div class="card">
        <div class="subject-title">HUMAN ANATOMY (HAP)</div>
        <div class="url-updater">
            <input type="text" placeholder="Paste YouTube Link..." id="in-hap">
            <button onclick="saveVideo('vid-hap', 'in-hap')">UPDATE VIDEO</button>
        </div>
        <div class="video-box" id="vid-hap">NO VIDEO</div>
        <textarea id="text-hap" oninput="saveText('text-hap')" placeholder="Write important questions here..."></textarea>
    </div>
</div>

<script>
    // VIDEO SAVE LOGIC
    function saveVideo(boxId, inputId) {
        const url = document.getElementById(inputId).value;
        const box = document.getElementById(boxId);
        let id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('youtu.be/')[1]?.split('?')[0];

        if (id) {
            const embed = `<iframe src="https://www.youtube-nocookie.com/embed/${id}" allowfullscreen></iframe>`;
            box.innerHTML = embed;
            localStorage.setItem(boxId, embed);
            document.getElementById(inputId).value = "";
        } else {
            alert("Invalid Link!");
        }
    }

    // TEXT SAVE LOGIC
    function saveText(id) {
        localStorage.setItem(id, document.getElementById(id).value);
    }

    // LOAD SAVED DATA ON REFRESH
    window.onload = function() {
        // Load Videos
        ['vid-chem', 'vid-hap'].forEach(id => {
            const saved = localStorage.getItem(id);
            if (saved) document.getElementById(id).innerHTML = saved;
        });
        
        // Load Text
        ['text-chem', 'text-hap'].forEach(id => {
            const saved = localStorage.getItem(id);
            if (saved) document.getElementById(id).value = saved;
        });
    };
</script>
</body>
</html>
